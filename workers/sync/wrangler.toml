name = "commonplace-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"
workers_dev = true

[dev]
port = 8798

[[durable_objects.bindings]]
name = "COMMONPLACE_ROOM"
class_name = "CommonplaceRoom"

[[durable_objects.bindings]]
name = "COMMONPLACE_SHARE"
class_name = "CommonplaceShare"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "CommonplaceRoom" ]

[[migrations]]
tag = "v2"
new_sqlite_classes = [ "CommonplaceShare" ]

[vars]
ALLOWED_ORIGINS = "http://localhost:8033,http://127.0.0.1:8033,https://emh.io"
APP_BASE_URL = "https://emh.io"
