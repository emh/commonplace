<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fffdf7" />
    <meta name="application-name" content="commonplace" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="commonplace" />
    <title>commonplace</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main id="view-home" class="view view-home active">
        <header class="home-header">
          <h1>commonplace</h1>
        </header>

        <section class="composer-panel">
          <form class="composer-form" id="card-form">
            <label class="composer-field" for="card-input">
              <textarea
                id="card-input"
                rows="1"
                autocomplete="off"
                spellcheck="true"
                placeholder="type something..."
              ></textarea>
            </label>

            <label class="composer-field composer-source-field" for="source-input">
              <input
                id="source-input"
                type="text"
                list="source-suggestions"
                autocomplete="off"
                placeholder="source (optional)"
              />
              <datalist id="source-suggestions"></datalist>
            </label>

            <div class="composer-footer">
              <button class="btn-primary" id="save-card-btn" type="submit" disabled>save</button>
            </div>
          </form>
        </section>

        <section class="search-panel">
          <input id="search-input" type="search" autocomplete="off" spellcheck="false" placeholder="search..." />
          <p id="card-stats" class="card-stats"></p>
        </section>

        <section class="cards-panel">
          <div class="card-list" id="card-list" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <script src="./config.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
